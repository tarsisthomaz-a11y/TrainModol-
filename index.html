<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treino App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--bg2:#1a1a1a;--bg3:#242424;--border:#2e2e2e;
  --text:#f0f0f0;--muted:#888;--accent:#f97316;--accent2:#ea580c;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;outline:none}

/* LAYOUT */
.app{max-width:480px;margin:0 auto;padding-bottom:80px}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px}
header .back-btn{width:36px;height:36px;background:var(--bg3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;display:none}
header h1{font-size:18px;font-weight:700;flex:1}
header .streak{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--accent);font-weight:600}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);display:flex}
.nav-btn{flex:1;padding:12px 0;background:none;color:var(--muted);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s}
.nav-btn.active,.nav-btn:hover{color:var(--accent)}
.nav-btn svg{width:20px;height:20px}

/* PAGES */
.page{display:none;padding:16px}
.page.active{display:block}

/* HOME PAGE */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stat-card .val{font-size:24px;font-weight:700;color:var(--accent)}
.stat-card .lbl{font-size:11px;color:var(--muted);margin-top:2px}

.section-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}

.today-card{background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;padding:18px;margin-bottom:20px;cursor:pointer;transition:transform .15s,opacity .15s}
.today-card:hover{transform:scale(1.01)}
.today-card .tc-label{font-size:12px;opacity:.8;margin-bottom:4px}
.today-card .tc-title{font-size:20px;font-weight:700;margin-bottom:2px}
.today-card .tc-sub{font-size:13px;opacity:.8}
.today-card .tc-progress{margin-top:12px}
.today-card .tc-progress-bar{background:rgba(0,0,0,.2);border-radius:99px;height:6px;margin-top:6px;overflow:hidden}
.today-card .tc-progress-fill{height:100%;background:#fff;border-radius:99px;transition:width .4s}

.plan-select-btn{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .2s,background .2s;width:100%}
.plan-select-btn:hover,.plan-select-btn.active{border-color:var(--accent);background:var(--bg3)}
.plan-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.plan-select-btn .info{flex:1;text-align:left}
.plan-select-btn .info .name{font-size:14px;font-weight:600}
.plan-select-btn .info .sub{font-size:12px;color:var(--muted);margin-top:2px}
.plan-select-btn .arrow{color:var(--muted);font-size:16px}

/* TREINO PAGE */
.day-selector{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:none}
.day-selector::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;padding:8px 16px;border-radius:99px;background:var(--bg2);border:1px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.day-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.day-pill.done{background:var(--bg3);border-color:var(--green);color:var(--green)}
.day-pill.rest{color:var(--muted);font-style:italic}

.day-header{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
.day-header h2{font-size:18px;font-weight:700;margin-bottom:4px}
.day-header .rest-info{font-size:12px;color:var(--muted);margin-bottom:12px}
.progress-bar{background:var(--bg3);border-radius:99px;height:8px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s}
.progress-label{font-size:12px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between}

.exercise-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.exercise-card.checked{border-color:var(--green)}
.ex-main{display:flex;align-items:center;gap:12px;padding:14px}
.ex-check{width:24px;height:24px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s;background:var(--bg3)}
.ex-check.checked{background:var(--green);border-color:var(--green)}
.ex-check svg{width:14px;height:14px;stroke:#fff;stroke-width:2.5;fill:none;display:none}
.ex-check.checked svg{display:block}
.ex-info{flex:1}
.ex-name{font-size:14px;font-weight:600;line-height:1.3}
.ex-meta{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
.ex-badge{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
.ex-badge.sets{color:var(--accent);border-color:rgba(249,115,22,.3);background:rgba(249,115,22,.1)}
.ex-badge.cardio{color:var(--blue);border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.1)}
.ex-expand{padding:0 14px 14px;border-top:1px solid var(--border);display:none}
.ex-expand .note{font-size:12px;color:var(--muted);padding-top:10px;line-height:1.5}
.exercise-card.expanded .ex-expand{display:block}

.rest-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;padding:14px;display:flex;align-items:center;gap:12px;font-style:italic;color:var(--muted)}

.complete-btn{width:100%;padding:16px;border-radius:14px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;margin-top:16px;transition:background .2s,transform .1s}
.complete-btn:hover{background:var(--accent2)}
.complete-btn:active{transform:scale(.98)}
.complete-btn:disabled{background:var(--green);cursor:default}

/* REST TIMER */
.timer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;display:none}
.timer-overlay.show{display:flex}
.timer-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px;text-align:center;min-width:280px}
.timer-box h3{font-size:14px;color:var(--muted);margin-bottom:16px;text-transform:uppercase;letter-spacing:.05em}
.timer-circle{width:140px;height:140px;border-radius:50%;border:4px solid var(--border);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;position:relative;font-size:42px;font-weight:700;background:var(--bg3)}
.timer-circle .ring{position:absolute;inset:-4px;border-radius:50%}
.timer-btns{display:flex;gap:10px;justify-content:center;margin-top:16px}
.timer-btns button{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600}
.btn-start{background:var(--accent);color:#fff}
.btn-skip{background:var(--bg3);color:var(--text);border:1px solid var(--border)}

/* HISTORY PAGE */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav{background:var(--bg2);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--text);font-size:16px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px}
.cal-day-hdr{text-align:center;font-size:11px;color:var(--muted);padding:4px 0}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--bg2);position:relative}
.cal-day.today{border:1px solid var(--accent);color:var(--accent);font-weight:700}
.cal-day.worked{background:rgba(249,115,22,.15);color:var(--accent)}
.cal-day.worked::after{content:'';width:5px;height:5px;background:var(--accent);border-radius:50%;position:absolute;bottom:3px;left:50%;transform:translateX(-50%)}
.cal-day.rest-day{background:rgba(59,130,246,.1);color:var(--blue)}
.cal-day.other-month{opacity:.3}

.history-list{}
.hist-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.hist-item .hi-date{font-size:12px;color:var(--muted)}
.hist-item .hi-name{font-size:15px;font-weight:600;margin-top:2px}
.hist-item .hi-stats{display:flex;gap:10px;margin-top:6px}
.hist-item .hi-badge{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--bg3);color:var(--muted)}

/* PLAN PICKER MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:150;display:none;align-items:flex-end}
.modal-overlay.show{display:flex}
.modal-box{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:85vh;overflow-y:auto}
.modal-box h2{font-size:18px;font-weight:700;margin-bottom:16px}
.modal-close{float:right;background:var(--bg3);border:none;color:var(--text);width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

.cat-tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none}
.cat-tab{flex-shrink:0;padding:8px 16px;border-radius:99px;background:var(--bg3);border:1px solid var(--border);font-size:13px;cursor:pointer;transition:all .2s}
.cat-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
.empty-state p{font-size:14px;line-height:1.6}

.tag-obs{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.2);border-radius:10px;padding:12px;font-size:12px;color:var(--accent);margin-bottom:10px;line-height:1.5}
</style>
</head>

  <div class="streak" id="streakDisplay">🔥 0 dias</div>
</header>

<!-- HOME -->
<div class="page active" id="pageHome">

    <div class="stat-card"><div class="val" id="statWeek">0</div><div class="lbl">Esta semana</div></div>
    <div class="stat-card"><div class="val" id="statTotal">0</div><div class="lbl">Total</div></div>
  </div>

  <div id="todayCardWrap"></div>

  <div class="section-title">Meu Plano</div>
  <div id="planDisplay">
    <div class="empty-state"><div class="icon">🏋️</div><p>Nenhum plano selecionado.<br>Toque em "Escolher Plano" para começar.</p></div>
  </div>
  <button class="plan-select-btn" onclick="openPlanPicker()" style="margin-top:8px;justify-content:center;color:var(--accent);border-color:rgba(249,115,22,.3)">
    <span>Escolher / Trocar Plano</span>
  </button>
</div>

<!-- TREINO -->
<div class="page" id="pageTreino">
  <div class="day-selector" id="daySelector"></div>
  <div id="dayContent"></div>
</div>

<!-- HISTORY -->
<div class="page" id="pageHistory">
  <div class="cal-header">
    <button class="cal-nav" onclick="calPrev()">‹</button>
    <span id="calMonth" style="font-weight:600;font-size:15px"></span>
    <button class="cal-nav" onclick="calNext()">›</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="section-title">Histórico</div>
  <div id="histList"></div>
</div>

</div><!-- /app -->

<nav class="nav">

    Início

    Treino
  </button>

</nav>

<!-- Plan Picker Modal -->
<div class="modal-overlay" id="planModal">

const CATEGORIES = ['Iniciante','Intermediário','Avançado','Mulheres'];
const CAT_COLORS = {Iniciante:'#22c55e',Intermediário:'#3b82f6',Avançado:'#f97316',Mulheres:'#ec4899'};

// ===================== STATE =====================
let state = {
  currentPlanId: null,
  currentDayIdx: 0,
  checks: {}, // { planId_dayId_exIdx: bool }
  completedWorkouts: [], // [{date,planId,dayId,dayName}]
  calDate: new Date(),
};

function loadState(){
  const s = localStorage.getItem('treinoAppState');
  if(s) state = {...state,...JSON.parse(s)};
  state.calDate = new Date();
}
function saveState(){
  const toSave = {...state, calDate:undefined};
  localStorage.setItem('treinoAppState',JSON.stringify(toSave));
}

// ===================== NAVIGATION =====================
let currentPage = 'Home';
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page'+name).classList.add('active');
  document.getElementById('nav'+name).classList.add('active');
  currentPage = name;
  document.getElementById('backBtn').style.display = 'none';
  if(name==='Home'){document.getElementById('pageTitle').textContent='💪 Treino'; renderHome();}
  if(name==='Treino'){document.getElementById('pageTitle').textContent='Meu Treino'; renderTreinoPage();}
  if(name==='History'){document.getElementById('pageTitle').textContent='Histórico'; renderHistory();}
}
function goBack(){showPage('Home');}

// ===================== HELPERS =====================
function getPlan(id){return PLANS.find(p=>p.id===id);}
function getDay(plan,idx){
  const d = plan.days[idx];
  if(d.repeat){return plan.days[d.repeat-1];}
  return d;
}
function checkKey(planId,dayId,exIdx){return `${planId}_${dayId}_${exIdx}`;}
function isChecked(planId,dayId,exIdx){return !!state.checks[checkKey(planId,dayId,exIdx)];}
function setCheck(planId,dayId,exIdx,val){
  state.checks[checkKey(planId,dayId,exIdx)]=val;
  saveState();
}
function getDayProgress(plan,dayIdx){
  const day = getDay(plan,dayIdx);
  if(!day.exercises) return {done:0,total:0};
  const total = day.exercises.length;
  const done = day.exercises.filter((_,i)=>isChecked(plan.id,day.id,i)).length;
  return {done,total};
}
function isDayComplete(plan,dayIdx){
  const {done,total}=getDayProgress(plan,dayIdx);
  return total>0 && done>=total;
}
function formatDate(d){
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function dateKey(d){return d.toISOString().slice(0,10);}
function getStreak(){
  if(!state.completedWorkouts.length) return 0;
  const dates = [...new Set(state.completedWorkouts.map(w=>w.date))].sort().reverse();
  const today = dateKey(new Date());
  const yesterday = dateKey(new Date(Date.now()-86400000));
  if(dates[0]!==today && dates[0]!==yesterday) return 0;
  let streak=0, check=dates[0]===today?new Date():new Date(Date.now()-86400000);
  for(let i=0;i<dates.length;i++){
    if(dates[i]===dateKey(check)){streak++;check=new Date(check-86400000);}
    else break;
  }
  return streak;
}
function getThisWeekCount(){
  const now = new Date();
  const weekStart = new Date(now); weekStart.setDate(now.getDate()-now.getDay());
  weekStart.setHours(0,0,0,0);
  return new Set(state.completedWorkouts.filter(w=>new Date(w.date)>=weekStart).map(w=>w.date)).size;
}

// ===================== HOME =====================
function renderHome(){
  const streak = getStreak();
  document.getElementById('statStreak').textContent = streak+'🔥';
  document.getElementById('statWeek').textContent = getThisWeekCount();
  document.getElementById('statTotal').textContent = new Set(state.completedWorkouts.map(w=>w.date)).size;
  document.getElementById('streakDisplay').textContent = '🔥 '+streak+' dias';

  const plan = getPlan(state.currentPlanId);
  const wrap = document.getElementById('todayCardWrap');
  if(plan){
    const dayIdx = state.currentDayIdx||0;
    const day = getDay(plan,dayIdx);
    const {done,total} = getDayProgress(plan,dayIdx);
    const pct = total>0?Math.round(done/total*100):0;
    const dayNum = plan.days[dayIdx];
    const isRest = dayNum.rest_day||(dayNum.repeat&&getDay(plan,dayIdx).rest_day);
    wrap.innerHTML=`<div class="today-card" onclick="showPage('Treino')">
      <div class="tc-label">${plan.name} • Hoje</div>
      <div class="tc-title">${day.name}</div>
      <div class="tc-sub">${isRest?'Dia de descanso 😴':(total?`${done}/${total} exercícios`:'Toque para ver')}</div>
      ${total?`<div class="tc-progress">
        <div style="display:flex;justify-content:space-between;font-size:12px;opacity:.8"><span>Progresso</span><span>${pct}%</span></div>
        <div class="tc-progress-bar"><div class="tc-progress-fill" style="width:${pct}%"></div></div>
      </div>`:''}
    </div>`;
  } else {wrap.innerHTML='';}

  const planDisplay = document.getElementById('planDisplay');
  if(plan){
    const color = CAT_COLORS[plan.cat]||'#f97316';
    planDisplay.innerHTML=`<div class="plan-select-btn" style="border-color:${color}40">
      <div class="plan-dot" style="background:${color}"></div>
      <div class="info"><div class="name">${plan.name}</div><div class="sub">${plan.weeks} • ${plan.cat}</div></div>
      <div class="arrow" style="color:${color}">✓</div>
    </div>`;
  }
}

// ===================== TREINO PAGE =====================
function renderTreinoPage(){
  const plan = getPlan(state.currentPlanId);
  if(!plan){
    document.getElementById('daySelector').innerHTML='';
    document.getElementById('dayContent').innerHTML=`<div class="empty-state"><div class="icon">🏋️</div><p>Selecione um plano na aba Início.</p></div>`;
    return;
  }
  renderDaySelector(plan);
  renderDayContent(plan, state.currentDayIdx||0);
}

function renderDaySelector(plan){
  const sel = document.getElementById('daySelector');
  sel.innerHTML = plan.days.map((d,i)=>{
    const realDay = d.repeat?plan.days[d.repeat-1]:d;
    const isRest = realDay.rest_day||d.rest_day;
    const done = isDayComplete(plan,i);
    let cls = 'day-pill';
    if(i===(state.currentDayIdx||0)) cls+=' active';
    else if(done) cls+=' done';
    else if(isRest) cls+=' rest';
    return `<div class="${cls}" onclick="selectDay(${i})">${d.name.replace('Treino ','').split(' – ')[0]}</div>`;
  }).join('');
}

function selectDay(idx){
  state.currentDayIdx = idx;
  saveState();
  const plan = getPlan(state.currentPlanId);
  renderDaySelector(plan);
  renderDayContent(plan,idx);
}

function renderDayContent(plan,dayIdx){
  const raw = plan.days[dayIdx];
  const day = getDay(plan,dayIdx);
  const cont = document.getElementById('dayContent');

  if(day.rest_day||raw.rest_day){
    cont.innerHTML=`<div style="text-align:center;padding:40px 20px">
      <div style="font-size:60px">😴</div>
      <div style="font-size:22px;font-weight:700;margin-top:12px">Dia de Descanso</div>
      <div style="color:var(--muted);margin-top:8px;font-size:14px">Recupere-se bem! O descanso é parte do treino.</div>
    </div>`;
    return;
  }

  const {done,total} = getDayProgress(plan,dayIdx);
  const pct = total>0?Math.round(done/total*100):0;
  const alreadyDone = state.completedWorkouts.some(w=>w.date===dateKey(new Date())&&w.planId===plan.id&&w.dayId===day.id);

  let html = `<div class="day-header">
    <h2>${day.name}</h2>
    <div class="rest-info">⏱ ${day.rest||plan.restNote||'Ver cada exercício'}</div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:${pct}%"></div></div>
    <div class="progress-label"><span>Progresso</span><span id="progLabel">${done}/${total}</span></div>
  </div>`;

  if(plan.obs||raw.obs||day.obs){
    html+=`<div class="tag-obs">💡 ${plan.obs||raw.obs||day.obs}</div>`;
  }

  if(day.exercises){
    day.exercises.forEach((ex,i)=>{
      const checked = isChecked(plan.id,day.id,i);
      const sText = ex.s&&ex.r ? (ex.s.includes('×')||ex.s.includes('min')? ex.s : `${ex.s}×`) : '';
      const rText = ex.r||'';
      html+=`<div class="exercise-card${checked?' checked':''}${ex.note?' expandable':''}" id="exCard_${i}">
        <div class="ex-main">
          <div class="ex-check${checked?' checked':''}" onclick="toggleCheck('${plan.id}','${day.id}',${i},${dayIdx})">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="ex-info">
            <div class="ex-name">${ex.n}</div>
            <div class="ex-meta">
              ${ex.cardio?`<span class="ex-badge cardio">🏃 ${ex.s}</span><span class="ex-badge cardio">${ex.r}</span>`:
               `<span class="ex-badge sets">${sText}${rText} reps</span>`}
              ${ex.note?`<span class="ex-badge" onclick="toggleExpand('exCard_${i}')">ℹ</span>`:''}
            </div>
          </div>
        </div>
        ${ex.note?`<div class="ex-expand"><div class="note">📌 ${ex.note}</div></div>`:''}
      </div>`;
    });
  }

  const btnLabel = alreadyDone?'✓ Treino Concluído Hoje':'Finalizar Treino';
  html+=`<button class="complete-btn" id="completeBtnMain" onclick="completeWorkout('${plan.id}','${day.id}','${day.name}',${dayIdx})" ${alreadyDone?'disabled':''}>
    ${btnLabel}
  </button>
  <button style="width:100%;padding:10px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);font-size:13px;margin-top:8px" onclick="openTimer(60)">
    ⏱ Iniciar Temporizador de Descanso
  </button>`;

  cont.innerHTML = html;
}

function toggleCheck(planId,dayId,exIdx,dayIdx){
  const val = !isChecked(planId,dayId,exIdx);
  setCheck(planId,dayId,exIdx,val);
  const card = document.getElementById('exCard_'+exIdx);
  const chk = card.querySelector('.ex-check');
  if(val){card.classList.add('checked');chk.classList.add('checked');}
  else{card.classList.remove('checked');chk.classList.remove('checked');}
  // update progress
  const plan = getPlan(planId);
  const {done,total} = getDayProgress(plan,dayIdx);
  const pct = total>0?Math.round(done/total*100):0;
  const pf = document.getElementById('progFill');
  const pl = document.getElementById('progLabel');
  if(pf) pf.style.width=pct+'%';
  if(pl) pl.textContent=`${done}/${total}`;
}

function toggleExpand(id){
  document.getElementById(id).classList.toggle('expanded');
}

function completeWorkout(planId,dayId,dayName,dayIdx){
  const today = dateKey(new Date());
  if(!state.completedWorkouts.some(w=>w.date===today&&w.planId===planId&&w.dayId===dayId)){
    state.completedWorkouts.push({date:today,planId,dayId,dayName});
  }
  // auto-advance to next day
  const plan = getPlan(planId);
  const nextIdx = (dayIdx+1) % plan.days.length;
  state.currentDayIdx = nextIdx;
  saveState();
  document.getElementById('completeBtnMain').textContent='✓ Treino Concluído Hoje';
  document.getElementById('completeBtnMain').disabled=true;
  renderDaySelector(plan);
  renderHome();
  alert('🎉 Treino finalizado! Ótimo trabalho!');
}

// ===================== TIMER =====================
let timerInterval=null, timerSecs=60, timerRunning=false;
function openTimer(secs){
  timerSecs=secs||60; timerRunning=false;
  document.getElementById('timerDisplay').textContent=timerSecs;
  document.getElementById('timerStartBtn').textContent='▶ Iniciar';
  document.getElementById('timerLabel').textContent='Pronto para descansar';
  document.getElementById('timerOverlay').classList.add('show');
}
function closeTimer(){
  clearInterval(timerInterval); timerRunning=false;
  document.getElementById('timerOverlay').classList.remove('show');
}
function toggleTimer(){
  if(timerRunning){
    clearInterval(timerInterval); timerRunning=false;
    document.getElementById('timerStartBtn').textContent='▶ Continuar';
  } else {
    timerRunning=true;
    document.getElementById('timerStartBtn').textContent='⏸ Pausar';
    timerInterval=setInterval(()=>{
      timerSecs--;
      document.getElementById('timerDisplay').textContent=timerSecs;
      if(timerSecs<=0){clearInterval(timerInterval);timerRunning=false;
        document.getElementById('timerLabel').textContent='✅ Descanso completo!';
        document.getElementById('timerStartBtn').textContent='▶ Reiniciar';
        timerSecs=60;
      }
    },1000);
  }
}

// ===================== PLAN PICKER =====================
let activeCat = 'Iniciante';
function openPlanPicker(){
  activeCat = 'Iniciante';
  renderCatTabs();
  renderPlanList();
  document.getElementById('planModal').classList.add('show');
}
function closePlanPicker(){document.getElementById('planModal').classList.remove('show');}
function renderCatTabs(){
  document.getElementById('catTabs').innerHTML=CATEGORIES.map(c=>
    `<div class="cat-tab${c===activeCat?' active':''}" onclick="setCat('${c}')" style="${c===activeCat?'background:'+CAT_COLORS[c]+';border-color:'+CAT_COLORS[c]:''}">${c}</div>`
  ).join('');
}
function setCat(c){activeCat=c;renderCatTabs();renderPlanList();}
function renderPlanList(){
  const plans = PLANS.filter(p=>p.cat===activeCat);
  const color = CAT_COLORS[activeCat]||'#f97316';
  document.getElementById('planList').innerHTML=plans.map(p=>`
    <div class="plan-select-btn${state.currentPlanId===p.id?' active':''}" onclick="selectPlan('${p.id}')">
      <div class="plan-dot" style="background:${color}"></div>
      <div class="info">
        <div class="name">${p.name}</div>
        <div class="sub">${p.weeks} • ${p.scheduleNote}</div>
      </div>
      <div class="arrow">${state.currentPlanId===p.id?'✓ Ativo':'›'}</div>
    </div>`).join('');
}
function selectPlan(id){
  state.currentPlanId=id;
  state.currentDayIdx=0;
  saveState();
  closePlanPicker();
  renderHome();
}

// ===================== HISTORY =====================
function renderHistory(){
  renderCalendar();
  renderHistList();
}
function renderCalendar(){
  const d = state.calDate;
  const y=d.getFullYear(), m=d.getMonth();
  document.getElementById('calMonth').textContent=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase());
  const worked = new Set(state.completedWorkouts.map(w=>w.date));
  const today = dateKey(new Date());
  const first=new Date(y,m,1), last=new Date(y,m+1,0);
  let html='<div class="cal-day-hdr">D</div><div class="cal-day-hdr">S</div><div class="cal-day-hdr">T</div><div class="cal-day-hdr">Q</div><div class="cal-day-hdr">Q</div><div class="cal-day-hdr">S</div><div class="cal-day-hdr">S</div>';
  for(let i=0;i<first.getDay();i++) html+=`<div class="cal-day other-month"></div>`;
  for(let day=1;day<=last.getDate();day++){
    const dk=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    let cls='cal-day';
    if(dk===today) cls+=' today';
    if(worked.has(dk)) cls+=' worked';
    html+=`<div class="${cls}">${day}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}
function calPrev(){state.calDate=new Date(state.calDate.getFullYear(),state.calDate.getMonth()-1,1);renderCalendar();}
function calNext(){state.calDate=new Date(state.calDate.getFullYear(),state.calDate.getMonth()+1,1);renderCalendar();}
function renderHistList(){
  const sorted=[...state.completedWorkouts].sort((a,b)=>b.date.localeCompare(a.date));
  if(!sorted.length){
    document.getElementById('histList').innerHTML=`<div class="empty-state"><div class="icon">📅</div><p>Nenhum treino registrado ainda.<br>Complete seu primeiro treino!</p></div>`;
    return;
  }
  const grouped={};
  sorted.forEach(w=>{if(!grouped[w.date])grouped[w.date]=[];grouped[w.date].push(w);});
  document.getElementById('histList').innerHTML=Object.entries(grouped).map(([date,ws])=>{
    const d=new Date(date+'T12:00:00');
    const label=d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
    return ws.map(w=>{
      const plan=getPlan(w.planId);
      return `<div class="hist-item">
        <div class="hi-date">${label.replace(/^\w/,c=>c.toUpperCase())}</div>
        <div class="hi-name">${w.dayName}</div>
        <div class="hi-stats">
          <span class="hi-badge">${plan?plan.name:'Plano'}</span>
          <span class="hi-badge">${plan?plan.cat:''}</span>
        </div>
      </div>`;
    }).join('');
  }).join('');
}

// ===================== INIT =====================
loadState();
renderHome();
if(!state.currentPlanId) showPage('Home');
</script>
